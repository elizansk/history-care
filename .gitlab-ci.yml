stages:
  - build
  - upload
  - deploy

variables:
  DOCKER_IMAGE_NAME: history-care-backend

build:
  stage: build
  tags:
    - deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t "$DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .

upload:
  stage: upload
  tags:
    - deploy
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - kind load docker-image "$DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA"

deploy:
  stage: deploy
  tags:
    - deploy
  needs:
    - upload
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - kubectl get pods
