stages:
  - test
  - build
  - upload
  - deploy
#Имена Docker-образов
variables:
  BACKEND_IMAGE_NAME: history-care-backend
  FRONTEND_IMAGE_NAME: history-care-frontend
#Запускаются только для merge request
backend-test:
  stage: test
  tags:
    - deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - docker run --rm -v "$CI_PROJECT_DIR/backend:/src" -w /src golang:1.25-alpine sh -c "apk add --no-cache git && go test ./..."
#Запускаются только для merge request
frontend-test:
  stage: test
  tags:
    - deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - docker run --rm -v "$CI_PROJECT_DIR/frontend:/app" -w /app node:20 sh -c "npm install && npm run build"
#build запускается только на main
#собирает backend и frontend images с тегом коммита
build:
  stage: build
  tags:
    - deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t "$BACKEND_IMAGE_NAME:$CI_COMMIT_SHORT_SHA" backend
    - docker build -t "$FRONTEND_IMAGE_NAME:$CI_COMMIT_SHORT_SHA" frontend
#upload загружает images в kind
upload:
  stage: upload
  tags:
    - deploy
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - kind load docker-image "$BACKEND_IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - kind load docker-image "$FRONTEND_IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
#создает/обновляет ConfigMap, применяет manifests
#обновляет images в deployments
#ждет rollout и показывает pods
deploy:
  stage: deploy
  tags:
    - deploy
  needs:
    - upload
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - kubectl create configmap history-care-conf --from-file=configs/ --namespace=default -o yaml --dry-run=client | kubectl apply -f -
    - kubectl apply -R -f manifests/
    - kubectl set image deployment/history-care-backend history-care-backend="$BACKEND_IMAGE_NAME:$CI_COMMIT_SHORT_SHA" migrate="$BACKEND_IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - kubectl set image deployment/history-care-frontend history-care-frontend="$FRONTEND_IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - kubectl rollout status deployment/history-care-backend
    - kubectl rollout status deployment/history-care-frontend
    - kubectl get pods
