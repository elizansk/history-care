basePath: /
definitions:
  handler.AddServiceToDraftRequest:
    properties:
      description:
        type: string
      price:
        type: number
      service_id:
        type: integer
    type: object
  handler.BulkAddServicesRequest:
    properties:
      services:
        items:
          properties:
            description:
              type: string
            price:
              type: number
            quantity:
              type: integer
            service_id:
              type: integer
          type: object
        type: array
    type: object
  handler.CreateDraftOrderRequest:
    properties:
      building_id:
        type: integer
      description:
        type: string
      total_amount:
        type: number
    type: object
  handler.DonationRequest:
    properties:
      amount:
        type: number
      email:
        type: string
      name:
        type: string
      order_id:
        type: integer
    required:
    - amount
    - order_id
    type: object
  handler.DonationResponse:
    properties:
      amount:
        type: number
      creator_email:
        type: string
      creator_name:
        type: string
      id:
        type: integer
      message:
        type: string
      order_id:
        type: integer
      user_id:
        type: integer
    type: object
  handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.RegisterRequest:
    properties:
      cityId:
        type: integer
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      role:
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - role
    type: object
  handler.UpdateOrderRequest:
    properties:
      address:
        type: string
      category_id:
        type: integer
      city_id:
        type: integer
      description:
        type: string
      name:
        type: string
    type: object
  handler.UpdateServiceInDraftRequest:
    properties:
      description:
        type: string
      price:
        type: number
    type: object
  models.Building:
    properties:
      address:
        type: string
      category:
        $ref: '#/definitions/models.BuildingCategory'
      category_id:
        type: integer
      city:
        $ref: '#/definitions/models.City'
      city_id:
        type: integer
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      orders:
        items:
          $ref: '#/definitions/models.ReconstructionOrder'
        type: array
      resources:
        items:
          $ref: '#/definitions/models.BuildingResource'
        type: array
    type: object
  models.BuildingCategory:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.BuildingResource:
    properties:
      building_id:
        type: integer
      id:
        type: integer
      is_main:
        type: boolean
      resource_type:
        type: string
      url:
        type: string
    type: object
  models.City:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.Donation:
    properties:
      amount:
        type: number
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      order_id:
        type: integer
      user_id:
        type: integer
    type: object
  models.OrderService:
    properties:
      description:
        type: string
      id:
        type: integer
      order_id:
        type: integer
      price:
        type: number
      service:
        $ref: '#/definitions/models.Service'
      service_id:
        type: integer
    type: object
  models.ReconstructionOrder:
    properties:
      building:
        $ref: '#/definitions/models.Building'
      building_id:
        type: integer
      collected_amount:
        type: number
      completed_at:
        type: string
      created_at:
        type: string
      creator:
        $ref: '#/definitions/models.User'
      creator_id:
        type: integer
      donations:
        items:
          $ref: '#/definitions/models.Donation'
        type: array
      id:
        type: integer
      moderator_id:
        type: integer
      services:
        items:
          $ref: '#/definitions/models.OrderService'
        type: array
      status:
        type: string
      total_amount:
        type: number
    type: object
  models.Service:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      image_url:
        type: string
      name:
        type: string
      status:
        type: string
      video_url:
        type: string
    type: object
  models.User:
    properties:
      city:
        $ref: '#/definitions/models.City'
      city_id:
        type: integer
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API documentation for History Care
  title: History Care API
  version: "1.0"
paths:
  /api/auth/cities:
    get:
      description: Возвращает список городов
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.City'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all cities
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Логин пользователя, возвращает JWT
      parameters:
      - description: Login credentials
        in: body
        name: loginRequest
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: выход пользователя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: User logout
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя и возвращает JWT
      parameters:
      - description: User registration data
        in: body
        name: registerRequest
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /api/buildings:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Building name
        in: formData
        name: name
        required: true
        type: string
      - description: Description
        in: formData
        name: description
        type: string
      - description: Address
        in: formData
        name: address
        required: true
        type: string
      - description: Category ID
        in: formData
        name: category_id
        required: true
        type: integer
      - description: City ID (only for admin)
        in: formData
        name: city_id
        type: integer
      - collectionFormat: csv
        description: Photos + Videos
        in: formData
        items:
          type: file
        name: files
        required: true
        type: array
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Building'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create building
      tags:
      - buildings
  /api/buildings/{id}:
    put:
      consumes:
      - multipart/form-data
      parameters:
      - description: Building ID
        in: path
        name: id
        required: true
        type: integer
      - description: Building name
        in: formData
        name: name
        type: string
      - description: Description
        in: formData
        name: description
        type: string
      - description: Address
        in: formData
        name: address
        type: string
      - description: Category ID
        in: formData
        name: category_id
        type: integer
      - description: City ID
        in: formData
        name: city_id
        type: integer
      - collectionFormat: csv
        description: Photos + Videos
        in: formData
        items:
          type: file
        name: files
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Building'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update building
      tags:
      - buildings
  /api/categories:
    get:
      description: Возвращает список категорий
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.BuildingCategory'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all categories
      tags:
      - categories
  /api/donations:
    post:
      consumes:
      - application/json
      description: Добавляет пожертвование на заявку
      parameters:
      - description: Donation data
        in: body
        name: donationRequest
        required: true
        schema:
          $ref: '#/definitions/handler.DonationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.DonationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Post a donation
      tags:
      - donation
  /api/orders:
    get:
      description: список заявок с фильтрацией (доступ ограничен ролями)
      parameters:
      - description: status (formed/ finished)
        in: query
        name: status
        type: string
      - description: date from (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: date to (YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ReconstructionOrder'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get orders
      tags:
      - orders
    post:
      consumes:
      - application/json
      description: Завершает черновую заявку и создает финальный заказ
      parameters:
      - description: Draft order ID
        in: body
        name: order_id
        required: true
        schema:
          properties:
            order_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ReconstructionOrder'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create final order from draft
      tags:
      - orders
  /api/orders/{id}:
    delete:
      description: Логическое удаление заявки (только владелец)
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete order
      tags:
      - orders
    get:
      description: Получение заявки (только владелец)
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ReconstructionOrder'
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      tags:
      - orders
    put:
      consumes:
      - application/json
      description: Редактирование заявки (только если draft)
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      - description: building fields
        in: body
        name: UpdateOrderRequest
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateOrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update order fields
      tags:
      - orders
  /api/orders/{id}/form:
    put:
      description: Формирование заявки (расчет суммы)
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Form order
      tags:
      - orders
  /api/orders/{id}/moderate:
    put:
      description: Завершение или отклонение заявки
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      - description: finish or reject
        in: query
        name: status
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Finish order (admin)
      tags:
      - orders
  /api/orders/{id}/services:
    post:
      consumes:
      - application/json
      description: Добавляет несколько услуг к заявке (массовое добавление)
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      - description: Services with quantities and descriptions
        in: body
        name: BulkAddServicesRequest
        required: true
        schema:
          $ref: '#/definitions/handler.BulkAddServicesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Add multiple services to draft order
      tags:
      - orders-services
  /api/orders/draft:
    get:
      description: Возвращает текущую черновую заявку пользователя (корзину). Если
        черновика нет — создаёт новый.
      produces:
      - application/json
      responses:
        "200":
          description: Draft order info
          schema:
            properties:
              count:
                type: integer
              order_id:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get draft order (cart)
      tags:
      - orders
    post:
      consumes:
      - application/json
      parameters:
      - description: Building id and order details
        in: body
        name: CreateDraftOrderRequest
        required: true
        schema:
          $ref: '#/definitions/handler.CreateDraftOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ReconstructionOrder'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create draft order
      tags:
      - orders
  /api/orders/formed:
    get:
      description: список заявок с фильтрацией (только заявки formed и connelction
        started)
      parameters:
      - description: Category Id
        in: query
        name: categoryId
        type: integer
      - description: City Id
        in: query
        name: cityId
        type: integer
      - description: date from (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: date to (YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ReconstructionOrder'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get donatable orders
      tags:
      - base_orders
  /api/orders/services:
    post:
      consumes:
      - application/json
      description: Добавляет услугу в заявку-черновик
      parameters:
      - description: service_id + price
        in: body
        name: AddServiceToDraftRequest
        required: true
        schema:
          $ref: '#/definitions/handler.AddServiceToDraftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Add service to draft order
      tags:
      - orders-services
  /api/orders/services/{service_id}:
    delete:
      description: Удаляет услугу из заявки-черновика
      parameters:
      - description: Service ID
        in: path
        name: service_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete service from draft
      tags:
      - orders-services
    put:
      consumes:
      - application/json
      description: Изменяет стоимость услуги в заявке
      parameters:
      - description: Service ID
        in: path
        name: service_id
        required: true
        type: integer
      - description: price and description
        in: body
        name: UpdateServiceInDraftRequest
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateServiceInDraftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update service price in draft
      tags:
      - orders-services
  /api/profile:
    get:
      description: Возвращает информацию о текущем пользователе
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get user profile
      tags:
      - profile
  /api/services:
    get:
      description: Возвращает список не удаленных услуг
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Service'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get services not delited
      tags:
      - services
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Service name
        in: formData
        name: name
        required: true
        type: string
      - description: Description
        in: formData
        name: description
        type: string
      - description: Image file
        in: formData
        name: image
        required: true
        type: file
      - description: Video file
        in: formData
        name: video
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Service'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create service
      tags:
      - services
