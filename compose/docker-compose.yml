services:

  postgres:
    image: postgres:15
    container_name: historycare_postgres
    environment:
      POSTGRES_USER: go_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: historycare
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "go_user" ]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password122
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data:/data
    command: server /data --console-address ":9001"

  adminer:
    image: adminer
    container_name: historycare_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres
  redis:
    image: redis:7-alpine
    container_name: historycare_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_ui
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile.migrate
    environment:
      DB_HOST: postgres
      DB_USER: go_user
      DB_PASSWORD: password
      DB_NAME: historycare
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "8000:8080"
    environment:
      DB_HOST: postgres
      DB_USER: go_user
      DB_PASSWORD: password
      DB_NAME: historycare
      DB_PORT: 5432
      TEMPLATES_PATH: "frontend/src/templates/*"
      STATIC_PATH: "frontend/src/resources"
      REDIS_HOST: local:redis:6379
      MINIO_HOST: minio
      MINIO_KEY: "admin"
      MINIO_SECRET: "password122"
      FRONTEND_URL: http://localhost
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-rub}

    volumes:
      - ../frontend:/app/frontend
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "go_user" ]
      interval: 5s
      retries: 5
    depends_on:
      migrate :
        condition: service_completed_successfully

  backend-ai:
    build:
      context: ../backend_ai
      dockerfile: Dockerfile
    container_name: historycare_ai
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: docker
      PORT: 3000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gpt-oss:20b-cloud
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ../frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - app
      - backend-ai

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
