apiVersion: apps/v1
kind: Deployment
metadata:
  name: history-care-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: history-care-minio
  template:
    metadata:
      labels:
        app: history-care-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              value: admin
            - name: MINIO_ROOT_PASSWORD
              value: password122
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          emptyDir: {}
