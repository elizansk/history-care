apiVersion: apps/v1
kind: Deployment
metadata:
  name: history-care-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: history-care-redis
  template:
    metadata:
      labels:
        app: history-care-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
